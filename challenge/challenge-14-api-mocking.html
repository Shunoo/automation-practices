<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenge 14 — API Mocking & Network Interception</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:2rem;max-width:800px;margin:0 auto}
  h1{font-size:1.5rem;margin-bottom:0.3rem;color:#f8fafc}
  .subtitle{color:#64748b;font-size:0.8rem;margin-bottom:2rem}
  .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:1.5rem;margin-bottom:1rem}
  .card h2{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:1rem}
  .btn{padding:0.5rem 1rem;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.85rem;transition:opacity 0.2s;margin-right:0.5rem;margin-bottom:0.5rem}
  .btn-blue{background:#3b82f6;color:white}.btn-green{background:#22c55e;color:white}.btn-red{background:#ef4444;color:white}.btn-gray{background:#475569;color:white}
  .result{margin-top:1rem;padding:1rem;background:#0f172a;border-radius:8px;font-family:monospace;font-size:0.8rem;min-height:40px;white-space:pre-wrap;word-break:break-all}
  .result.loading{color:#f59e0b}.result.success{color:#22c55e}.result.error{color:#ef4444}
  .user-list{display:flex;flex-direction:column;gap:0.5rem}
  .user-item{display:flex;justify-content:space-between;align-items:center;padding:0.6rem;background:#0f172a;border-radius:6px;font-size:0.85rem}
  .user-name{font-weight:600}.user-email{color:#64748b;font-size:0.8rem}
  .badge{padding:0.15rem 0.5rem;border-radius:4px;font-size:0.7rem;font-weight:600}
  .badge.active{background:rgba(34,197,94,0.2);color:#22c55e}.badge.inactive{background:rgba(239,68,68,0.2);color:#ef4444}
  .request-log{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:0.3rem;margin-top:0.8rem}
  .log-entry{font-family:monospace;font-size:0.75rem;padding:0.3rem 0.5rem;background:#0f172a;border-radius:4px;display:flex;gap:0.8rem}
  .log-method{font-weight:700;min-width:50px}
  .log-method.GET{color:#3b82f6}.log-method.POST{color:#22c55e}.log-method.PUT{color:#f59e0b}.log-method.DELETE{color:#ef4444}
  .log-url{color:#94a3b8;flex:1}.log-status{font-weight:600}
</style>
</head>
<body>
<h1>API Dashboard</h1>
<p class="subtitle">Challenge 14 — Intercept, mock, and validate API calls. Test loading/error/success states.</p>

<!-- USER LIST (GET /api/users) -->
<div class="card" data-testid="users-card">
  <h2>Users (GET /api/users)</h2>
  <button class="btn btn-blue" id="fetch-users" data-testid="fetch-users">Fetch Users</button>
  <button class="btn btn-gray" id="refresh-users" data-testid="refresh-users">Refresh</button>
  <div class="result" id="users-status" data-testid="users-status"></div>
  <div class="user-list" id="user-list" data-testid="user-list"></div>
</div>

<!-- CREATE USER (POST /api/users) -->
<div class="card" data-testid="create-card">
  <h2>Create User (POST /api/users)</h2>
  <div style="display:flex;gap:0.5rem;margin-bottom:0.8rem;flex-wrap:wrap">
    <input type="text" id="new-name" data-testid="new-name" placeholder="Name" style="flex:1;padding:0.5rem;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:0.85rem">
    <input type="email" id="new-email" data-testid="new-email" placeholder="Email" style="flex:1;padding:0.5rem;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:0.85rem">
  </div>
  <button class="btn btn-green" id="create-user" data-testid="create-user">Create</button>
  <div class="result" id="create-status" data-testid="create-status"></div>
</div>

<!-- DELETE USER (DELETE /api/users/:id) -->
<div class="card" data-testid="delete-card">
  <h2>Delete User (DELETE /api/users/:id)</h2>
  <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.8rem">
    <input type="number" id="delete-id" data-testid="delete-id" placeholder="User ID" style="width:100px;padding:0.5rem;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:0.85rem">
    <button class="btn btn-red" id="delete-user" data-testid="delete-user">Delete</button>
  </div>
  <div class="result" id="delete-status" data-testid="delete-status"></div>
</div>

<!-- SLOW ENDPOINT (GET /api/analytics) -->
<div class="card" data-testid="analytics-card">
  <h2>Analytics (GET /api/analytics — 3s delay)</h2>
  <button class="btn btn-blue" id="fetch-analytics" data-testid="fetch-analytics">Load Analytics</button>
  <div class="result" id="analytics-status" data-testid="analytics-status"></div>
</div>

<!-- REQUEST LOG -->
<div class="card" data-testid="request-log-card">
  <h2>Request Log</h2>
  <button class="btn btn-gray" id="clear-log" data-testid="clear-log">Clear</button>
  <div class="request-log" id="request-log" data-testid="request-log"></div>
</div>

<script>
const API_BASE='/api';
let requestLog=[];
const fakeUsers=[
  {id:1,name:'Alice Johnson',email:'alice@test.com',status:'active'},
  {id:2,name:'Bob Smith',email:'bob@test.com',status:'active'},
  {id:3,name:'Carol White',email:'carol@test.com',status:'inactive'},
  {id:4,name:'Dave Brown',email:'dave@test.com',status:'active'},
  {id:5,name:'Eve Davis',email:'eve@test.com',status:'inactive'}
];
let nextId=6;

function logRequest(method,url,status,body){
  requestLog.push({method,url,status,body,time:new Date()});
  const log=document.getElementById('request-log');
  const el=document.createElement('div');el.className='log-entry';el.setAttribute('data-testid','log-entry');
  el.innerHTML=`<span class="log-method ${method}">${method}</span><span class="log-url">${url}</span><span class="log-status" style="color:${status>=400?'#ef4444':status>=300?'#f59e0b':'#22c55e'}">${status}</span>`;
  log.prepend(el);
}

// Fake fetch that intercepts /api/* routes
const originalFetch=window.fetch;
window.fetch=async function(url,options={}){
  const method=(options.method||'GET').toUpperCase();

  // GET /api/users
  if(url===`${API_BASE}/users`&&method==='GET'){
    const status=document.getElementById('users-status');
    status.className='result loading';status.textContent='Loading...';
    await new Promise(r=>setTimeout(r,800+Math.random()*1200));
    logRequest('GET',url,200);
    status.className='result success';status.textContent=`Loaded ${fakeUsers.length} users`;
    renderUsers();
    return{ok:true,status:200,json:async()=>({users:fakeUsers})};
  }

  // POST /api/users
  if(url===`${API_BASE}/users`&&method==='POST'){
    const body=JSON.parse(options.body||'{}');
    const status=document.getElementById('create-status');
    status.className='result loading';status.textContent='Creating...';
    await new Promise(r=>setTimeout(r,500+Math.random()*500));
    if(!body.name||!body.email){
      logRequest('POST',url,400,body);
      status.className='result error';status.textContent='400: Name and email are required';
      return{ok:false,status:400,json:async()=>({error:'Name and email required'})};
    }
    const newUser={id:nextId++,name:body.name,email:body.email,status:'active'};
    fakeUsers.push(newUser);
    logRequest('POST',url,201,newUser);
    status.className='result success';status.textContent=`Created user #${newUser.id}: ${newUser.name}`;
    renderUsers();
    return{ok:true,status:201,json:async()=>({user:newUser})};
  }

  // DELETE /api/users/:id
  if(url.startsWith(`${API_BASE}/users/`)&&method==='DELETE'){
    const id=parseInt(url.split('/').pop());
    const status=document.getElementById('delete-status');
    status.className='result loading';status.textContent='Deleting...';
    await new Promise(r=>setTimeout(r,400));
    const idx=fakeUsers.findIndex(u=>u.id===id);
    if(idx===-1){
      logRequest('DELETE',url,404);
      status.className='result error';status.textContent=`404: User #${id} not found`;
      return{ok:false,status:404,json:async()=>({error:'User not found'})};
    }
    fakeUsers.splice(idx,1);
    logRequest('DELETE',url,200);
    status.className='result success';status.textContent=`Deleted user #${id}`;
    renderUsers();
    return{ok:true,status:200,json:async()=>({deleted:true})};
  }

  // GET /api/analytics (slow)
  if(url===`${API_BASE}/analytics`&&method==='GET'){
    const status=document.getElementById('analytics-status');
    status.className='result loading';status.textContent='Loading analytics (this takes ~3s)...';
    await new Promise(r=>setTimeout(r,3000));
    const data={pageViews:12847,uniqueVisitors:3291,bounceRate:42.3,avgSession:'4m 23s',topPages:['/home','/products','/about']};
    logRequest('GET',url,200);
    status.className='result success';status.textContent=JSON.stringify(data,null,2);
    return{ok:true,status:200,json:async()=>data};
  }

  return originalFetch.apply(this,arguments);
};

function renderUsers(){
  const list=document.getElementById('user-list');list.innerHTML='';
  fakeUsers.forEach(u=>{
    const el=document.createElement('div');el.className='user-item';el.setAttribute('data-testid',`user-${u.id}`);
    el.innerHTML=`<div><span class="user-name" data-testid="user-name-${u.id}">${u.name}</span><br><span class="user-email" data-testid="user-email-${u.id}">${u.email}</span></div><span class="badge ${u.status}" data-testid="user-status-${u.id}">${u.status}</span>`;
    list.appendChild(el);
  });
}

document.getElementById('fetch-users').addEventListener('click',()=>fetch(`${API_BASE}/users`));
document.getElementById('refresh-users').addEventListener('click',()=>fetch(`${API_BASE}/users`));
document.getElementById('create-user').addEventListener('click',()=>{
  fetch(`${API_BASE}/users`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('new-name').value,email:document.getElementById('new-email').value})});
});
document.getElementById('delete-user').addEventListener('click',()=>{
  const id=document.getElementById('delete-id').value;
  if(id)fetch(`${API_BASE}/users/${id}`,{method:'DELETE'});
});
document.getElementById('fetch-analytics').addEventListener('click',()=>fetch(`${API_BASE}/analytics`));
document.getElementById('clear-log').addEventListener('click',()=>{requestLog=[];document.getElementById('request-log').innerHTML='';});

window.__API__={getUsers:()=>fakeUsers,getLog:()=>requestLog,getNextId:()=>nextId};
</script>
</body>
</html>
